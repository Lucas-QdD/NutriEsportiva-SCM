<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriEsportiva - SÃO CAMILO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app"></div>

    <!-- Login Page -->
    <template id="login-template">
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">
                    <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
                        <circle cx="30" cy="30" r="28" stroke="#c41e3a" stroke-width="2" fill="none"/>
                        <text x="30" y="38" font-size="24" font-weight="bold" text-anchor="middle" fill="#c41e3a">SAO</text>
                    </svg>
                    <h1>NutriEsportiva</h1>
                    <p>SÃO CAMILO</p>
                </div>

                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                    </div>

                    <div class="form-group">
                        <label for="user-type">Tipo de Usuário</label>
                        <select id="user-type" required>
                            <option value="">Selecione</option>
                            <option value="nutritionist">Nutricionista</option>
                            <option value="athlete">Atleta</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Entrar</button>
                </form>
            </div>
        </div>
    </template>

    <!-- Main Layout -->
    <template id="main-layout-template">
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <svg width="40" height="40" viewBox="0 0 60 60" fill="none">
                            <circle cx="30" cy="30" r="28" stroke="#c41e3a" stroke-width="2" fill="none"/>
                            <text x="30" y="38" font-size="20" font-weight="bold" text-anchor="middle" fill="#c41e3a">SAO</text>
                        </svg>
                        <span>NutriEsportiva</span>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <a href="#dashboard" class="nav-item active" data-page="dashboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="#athletes" class="nav-item nutritionist-only" data-page="athletes" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span>Atletas</span>
                    </a>
                    <a href="#evaluation" class="nav-item athlete-only" data-page="evaluation" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        <span>Começar Avaliação</span>
                    </a>
                    <a href="#manual" class="nav-item" data-page="manual">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        <span>Como Usar</span>
                    </a>
                    <a href="#terms" class="nav-item" data-page="terms">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                            <line x1="9" y1="13" x2="15" y2="13"></line>
                            <line x1="9" y1="17" x2="15" y2="17"></line>
                        </svg>
                        <span>Termos de Uso</span>
                    </a>
                    <a href="#settings" class="nav-item" data-page="settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-4.22 7.78l4.24-4.24m-10.56 0l4.24 4.24"></path>
                        </svg>
                        <span>Configurações</span>
                    </a>
                </nav>

                <div class="sidebar-footer">
                    <button id="logout-btn" class="btn btn-logout">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Sair</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <header class="top-bar">
                    <h2 id="page-title">Dashboard</h2>
                </header>

                <div id="content-area" class="content-area">
                    <!-- Page content will be inserted here -->
                </div>
            </main>
        </div>
    </template>

    <!-- Dashboard Page -->
    <template id="dashboard-template">
        <div class="page-content">
            <div class="dashboard-header">
                <h3>Bem-vindo ao Dashboard</h3>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">5</div>
                    <div class="stat-label">Atletas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">8</div>
                    <div class="stat-label">Avaliações</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h4>Avaliações Recentes</h4>
                    <button class="btn btn-primary btn-sm" onclick="appState.navigate('athletes')">Nova Avaliação</button>
                </div>
                <div class="evaluations-list">
                    <div class="evaluation-item">
                        <div class="athlete-name">João Silva</div>
                        <div class="evaluation-date">12/04/2026</div>
                        <button class="btn btn-outline btn-sm">Visualizar</button>
                    </div>
                    <div class="evaluation-item">
                        <div class="athlete-name">Maria Santos</div>
                        <div class="evaluation-date">11/04/2026</div>
                        <button class="btn btn-outline btn-sm">Visualizar</button>
                    </div>
                    <div class="evaluation-item">
                        <div class="athlete-name">Lucas Costa</div>
                        <div class="evaluation-date">10/04/2026</div>
                        <button class="btn btn-outline btn-sm">Visualizar</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Athletes Page -->
    <template id="athletes-template">
        <div class="page-content">
            <div class="athletes-header">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="athlete-search" placeholder="Pesquise por um atleta...">
                </div>
                <button class="btn btn-primary" onclick="appState.showAthleteForm()">+ Adicionar Atleta</button>
            </div>

            <div id="athletes-list" class="athletes-grid">
                <!-- Athletes will be added dynamically -->
            </div>

            <!-- Athlete Form Modal -->
            <div id="athlete-modal" class="modal" style="display: none;">
                <div class="modal-content modal-lg">
                    <div class="modal-header">
                        <h3 id="modal-title">Novo Atleta</h3>
                        <button class="modal-close" onclick="appState.closeAthleteForm()">&times;</button>
                    </div>
                    <form id="athlete-form" class="athlete-form">
                        <div class="form-row">
                            <div class="form-group col-6">
                                <label for="athlete-name">Nome *</label>
                                <input type="text" id="athlete-name" required>
                            </div>
                            <div class="form-group col-6">
                                <label for="athlete-dob">Data de Nascimento *</label>
                                <input type="date" id="athlete-dob" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-3">
                                <label for="athlete-height">Altura (cm) *</label>
                                <input type="number" id="athlete-height" step="0.01" required>
                            </div>
                            <div class="form-group col-3">
                                <label for="athlete-weight">Peso (kg) *</label>
                                <input type="number" id="athlete-weight" step="0.01" required>
                            </div>
                            <div class="form-group col-3">
                                <label for="athlete-sex">Sexo *</label>
                                <select id="athlete-sex" required>
                                    <option value="">Selecione</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Feminino</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-6">
                                <label for="athlete-sweating">Sudoração Percebida</label>
                                <select id="athlete-sweating">
                                    <option value="">Selecione</option>
                                    <option value="Leve">Leve</option>
                                    <option value="Moderada">Moderada</option>
                                    <option value="Alta">Alta</option>
                                </select>
                            </div>
                            <div class="form-group col-6">
                                <label for="athlete-salt">Manchas de Sal</label>
                                <select id="athlete-salt">
                                    <option value="">Selecione</option>
                                    <option value="Nenhuma">Nenhuma</option>
                                    <option value="Pouca">Pouca</option>
                                    <option value="Muita">Muita</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-6">
                                <label for="athlete-diseases">Doenças Relevantes</label>
                                <input type="text" id="athlete-diseases" placeholder="Digite as doenças...">
                            </div>
                            <div class="form-group col-6">
                                <label for="athlete-calipers">Pregas Calipétricas Frequentes</label>
                                <input type="text" id="athlete-calipers" placeholder="Sim/Não">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-6">
                                <label for="athlete-hydration">Estratégia de Hidratação</label>
                                <textarea id="athlete-hydration" placeholder="Descreva a estratégia..."></textarea>
                            </div>
                            <div class="form-group col-6">
                                <label for="athlete-symptoms">Sintomas</label>
                                <textarea id="athlete-symptoms" placeholder="Descreva os sintomas..."></textarea>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-6">
                                <label for="athlete-diuretics">Medicamentos Diuréticos</label>
                                <input type="text" id="athlete-diuretics" placeholder="Sim/Não">
                            </div>
                        </div>

                        <div class="form-row">
                            <button type="submit" class="btn btn-primary">Criar Atleta</button>
                            <button type="button" class="btn btn-secondary" onclick="appState.closeAthleteForm()">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </template>

    <!-- Athlete Evaluation Page -->
    <template id="evaluation-template">
        <div class="page-content">
            <div class="evaluation-header">
                <h3>Começar Avaliação</h3>
                <p>Preencha os dados para sua avaliação nutricional</p>
            </div>

            <div class="section">
                <form id="evaluation-form" class="evaluation-form">
                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="eval-date">Data da Avaliação *</label>
                            <input type="date" id="eval-date" required>
                        </div>
                        <div class="form-group col-6">
                            <label for="eval-weight">Peso Atual (kg) *</label>
                            <input type="number" id="eval-weight" step="0.01" placeholder="Ex: 70.5" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="eval-sweating">Sudoração Percebida</label>
                            <select id="eval-sweating">
                                <option value="">Selecione</option>
                                <option value="Leve">Leve</option>
                                <option value="Moderada">Moderada</option>
                                <option value="Alta">Alta</option>
                            </select>
                        </div>
                        <div class="form-group col-6">
                            <label for="eval-salt">Manchas de Sal</label>
                            <select id="eval-salt">
                                <option value="">Selecione</option>
                                <option value="Nenhuma">Nenhuma</option>
                                <option value="Pouca">Pouca</option>
                                <option value="Muita">Muita</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="eval-hydration">Estratégia de Hidratação</label>
                            <textarea id="eval-hydration" placeholder="Descreva sua estratégia de hidratação..."></textarea>
                        </div>
                        <div class="form-group col-6">
                            <label for="eval-symptoms">Sintomas</label>
                            <textarea id="eval-symptoms" placeholder="Descreva seus sintomas..."></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-6">
                            <label for="eval-diuretics">Medicamentos Diuréticos</label>
                            <input type="text" id="eval-diuretics" placeholder="Sim/Não">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Enviar Avaliação</button>
                        <button type="reset" class="btn btn-secondary">Limpar</button>
                    </div>
                </form>
            </div>

            <div class="section" id="evaluations-history">
                <h4>Suas Avaliações Anteriores</h4>
                <div id="athlete-evaluations-list" class="evaluations-list">
                    <!-- Previous evaluations will be added here -->
                </div>
            </div>
        </div>
    </template>

    <!-- Manual Operacional Page -->
    <template id="manual-template">
        <div class="page-content">
            <h3>Manual Operacional</h3>

            <div class="section">
                <h4>Padronização de Pesagem</h4>
                <div class="checklist">
                    <div class="checklist-item">
                        <input type="checkbox" id="check1">
                        <label for="check1">Balança calibrada e em superfície plana</label>
                    </div>
                    <div class="checklist-item">
                        <input type="checkbox" id="check2">
                        <label for="check2">Medição em horário padrão (manhã em jejum)</label>
                    </div>
                    <div class="checklist-item">
                        <input type="checkbox" id="check3">
                        <label for="check3">Roupa padronizada ou sem roupa</label>
                    </div>
                    <div class="checklist-item">
                        <input type="checkbox" id="check4">
                        <label for="check4">Registro imediato dos dados</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h4>Detecção de Inconsistências</h4>
                <div class="info-box">
                    <p>Os dados serão validados automaticamente durante o registro. Se houver variações significativas (variação > 5% da medição anterior), o sistema alertará para revisão.</p>
                </div>
            </div>
        </div>
    </template>

    <!-- Terms and Conditions Page -->
    <template id="terms-template">
        <div class="page-content">
            <h3>Termos de Uso e Política de Privacidade</h3>
            <p style="font-size: 12px; color: var(--gray-600); margin-bottom: 25px;"><strong>Última atualização:</strong> Abril de 2026</p>

            <div class="section">
                <h4>1. Aceitação dos Termos</h4>
                <p>Ao utilizar a plataforma NutriEsportiva, você concorda em aceitar integralmente estes Termos de Uso e Política de Privacidade. Se não concordar com qualquer disposição, você não está autorizado a usar o sistema. O uso contínuo da plataforma constitui aceitação dos termos aqui estabelecidos.</p>
            </div>

            <div class="section">
                <h4>2. Descrição do Serviço</h4>
                <p>A plataforma NutriEsportiva é um sistema de gestão e avaliação nutricional de atletas desenvolvido pela Universidade MAUÁ do Instituto de Tecnologia, em parceria com a instituição SÃO CAMILO. O sistema é destinado exclusivamente para:</p>
                <ul style="margin-left: 20px;">
                    <li>Avaliação nutricional de atletas</li>
                    <li>Acompanhamento de desempenho esportivo</li>
                    <li>Gestão de dados de treinamento e nutrição</li>
                    <li>Educação e orientação nutricional personalizada</li>
                </ul>
            </div>

            <div class="section">
                <h4>3. Elegibilidade e Acesso</h4>
                <p>O acesso à plataforma é restrito a:</p>
                <ul style="margin-left: 20px;">
                    <li><strong>Nutricionistas e Profissionais Autorizados:</strong> Credenciados pela instituição SÃO CAMILO para gerenciar avaliações e acompanhamento de atletas</li>
                    <li><strong>Atletas:</strong> Registrados oficialmente no programa de treinamento da instituição</li>
                </ul>
                <p>Você declara que possui autorização válida para acessar este sistema e concorda em manter a confidencialidade de suas credenciais de acesso.</p>
            </div>

            <div class="section">
                <h4>4. Proteção de Dados Pessoais (LGPD)</h4>
                <p>Conforme a Lei Geral de Proteção de Dados (LGPD - Lei nº 13.709/2018), a NutriEsportiva:</p>
                <ul style="margin-left: 20px;">
                    <li>Coleta e processa dados pessoais dos atletas apenas para os fins legítimos descritos neste termos</li>
                    <li>Implementa medidas técnicas e administrativas para proteger dados contra acesso não autorizado</li>
                    <li>Garante o direito dos usuários de acessar, retificar e solicitar exclusão de seus dados pessoais</li>
                    <li>Não compartilha dados de atletas com terceiros sem consentimento explícito</li>
                    <li>Mantém registros seguros de todas as atividades de acesso e modificação de dados</li>
                </ul>
            </div>

            <div class="section">
                <h4>5. Confidencialidade e Responsabilidades do Usuário</h4>
                <p>Você concorda em:</p>
                <ul style="margin-left: 20px;">
                    <li>Manter a confidencialidade absoluta de toda informação de atletas acessada através da plataforma</li>
                    <li>Não divulgar, copiar ou compartilhar dados de desempenho ou avaliações de atletas</li>
                    <li>Proteger sua senha com segurança máxima e não compartilhá-la com ninguém</li>
                    <li>Reportar imediatamente qualquer acesso não autorizado ou suspeita de segurança</li>
                    <li>Usar o sistema exclusivamente para fins autorizados</li>
                    <li>Não tentar acessar áreas restritas ou contornar medidas de segurança</li>
                    <li>Registrar avaliações de forma precisa e honesta</li>
                </ul>
            </div>

            <div class="section">
                <h4>6. Avaliações Nutricionais e Isenção de Responsabilidade Médica</h4>
                <p>A plataforma NutriEsportiva fornece ferramentas para avaliação e acompanhamento nutricional, mas <strong>não substitui</strong> atendimento profissional médico. O sistema é destinado a complementar a orientação nutricional profissional.</p>
                <p>Os profissionais que utilizam a plataforma são responsáveis por:</p>
                <ul style="margin-left: 20px;">
                    <li>Ser adequadamente credenciado e qualificado em nutrição esportiva</li>
                    <li>Seguir todos os protocolos e diretrizes da instituição</li>
                    <li>Garantir que as recomendações sejam baseadas em avaliação completa do atleta</li>
                    <li>Coletar dados de forma consistente e padronizada</li>
                </ul>
            </div>

            <div class="section">
                <h4>7. Dados e Integridade das Avaliações</h4>
                <p>Os dados registrados na plataforma devem ser:</p>
                <ul style="margin-left: 20px;">
                    <li>Precisos e obtidos por métodos padronizados</li>
                    <li>Registrados no mesmo dia da coleta sempre que possível</li>
                    <li>Revisados regularmente para detectar inconsistências</li>
                    <li>Mantidos como registros permanentes para auditoria</li>
                </ul>
            </div>

            <div class="section">
                <h4>8. Modificações e Disponibilidade do Sistema</h4>
                <p>A NutriEsportiva reserva o direito de:</p>
                <ul style="margin-left: 20px;">
                    <li>Modificar, atualizar ou melhorar a plataforma a qualquer momento</li>
                    <li>Suspender temporariamente o serviço para manutenção ou atualizações</li>
                    <li>Descontinuar funcionalidades específicas com aviso prévio</li>
                </ul>
                <p>Nós nos esforçamos para manter o sistema operacional 24/7, mas não garantimos disponibilidade ininterrupta.</p>
            </div>

            <div class="section">
                <h4>9. Limitações de Responsabilidade</h4>
                <p>A plataforma é fornecida "no estado em que se encontra". Na máxima extensão permitida pela lei:</p>
                <ul style="margin-left: 20px;">
                    <li>A instituição não se responsabiliza por danos indiretos, incidentais ou consequentes</li>
                    <li>Não garantimos resultados específicos de desempenho atléico</li>
                    <li>Não nos responsabilizamos por perda de dados causada por ações do usuário</li>
                    <li>Não assumimos responsabilidade por decisões tomadas com base nos dados da plataforma</li>
                </ul>
            </div>

            <div class="section">
                <h4>10. Violação de Termos</h4>
                <p>A violação destes termos pode resultar em:</p>
                <ul style="margin-left: 20px;">
                    <li>Suspensão imediata do acesso à plataforma</li>
                    <li>Revogação permanente de credenciais</li>
                    <li>Ações legais conforme aplicável</li>
                    <li>Notificação às autoridades competentes em caso de crimes</li>
                </ul>
            </div>

            <div class="section">
                <h4>11. Propriedade Intelectual</h4>
                <p>Todos os conteúdos, funcionalidades e design da plataforma NutriEsportiva são propriedade exclusiva da Universidade MAUÁ e SÃO CAMILO. Sua reprodução, distribuição ou uso sem autorização é proibida.</p>
            </div>
